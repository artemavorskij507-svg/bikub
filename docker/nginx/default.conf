server {
    listen 80;
    server_name localhost:2244;
    root /var/www/html/public;
    index index.php index.html;

    # Laravel application (default)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Перехват /n8n и редирект на главную
    location ~ ^/n8n(/.*)?$ {
        # Явно указываем порт хоста в локальной среде, чтобы избежать перехода на :80
        return 301 http://localhost:2244/;
    }

    # PHP processing for Laravel
    location ~ \.php$ {
        fastcgi_pass bikube_php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Preserve the original Host header (including external port, e.g. :2244)
        # so Laravel generates same-origin asset URLs.
        fastcgi_param HTTP_HOST $http_host;
        fastcgi_param SERVER_PORT $server_port;
        fastcgi_param HTTPS $https if_not_empty;
        
        # Buffer settings
        fastcgi_buffering on;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_max_temp_file_size 2m;
        fastcgi_temp_file_write_size 32k;
        
        # Timeouts
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_read_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }
}
