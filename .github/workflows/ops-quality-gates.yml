name: Ops Quality Gates

on:
  pull_request:
    branches: ["*"]
  workflow_dispatch:

jobs:
  php-quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glfbikube_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d glfbikube_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: testing
      APP_KEY: base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: glfbikube_test
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, pdo, pdo_pgsql, redis
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Node dependencies
        run: npm ci

      - name: Validate composer
        run: composer validate --strict

      - name: Pint
        run: ./vendor/bin/pint --test

      - name: Prepare app
        run: |
          cp -n .env.example .env || true
          php artisan key:generate --force
          php artisan migrate --force

      - name: Run Unit + Feature tests
        run: php artisan test --testsuite=Unit,Feature --stop-on-failure

      - name: Runtime smoke dispatch
        run: php artisan ops:smoke-dispatch --mode=runtime --json=storage/app/ops-smoke-runtime-report.json

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-smoke-runtime-report
          path: storage/app/ops-smoke-runtime-report.json
          if-no-files-found: ignore

  e2e-critical:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run critical checkout e2e against staging/prod URL
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "E2E_BASE_URL secret is not set"
            exit 1
          fi
          npx playwright test tests/e2e/delivery-submit.spec.js tests/e2e/delivery-submit-negative.spec.js --reporter=line
