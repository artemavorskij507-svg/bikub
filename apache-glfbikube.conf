<VirtualHost *:2244>
    ServerName localhost
    ServerAlias 127.0.0.1 localhost:2244
    
    DocumentRoot "/home/dima/Стільниця/glfbikube (1-я копия)/public"
    
    # Main project directory
    <Directory "/home/dima/Стільниця/glfbikube (1-я копия)/public">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php index.html
        
        # Fallback to index.php for all requests (Laravel routing)
        FallbackResource /index.php
    </Directory>
    
    <Directory "/home/dima/Стільниця/glfbikube (1-я копия)">
        AllowOverride None
        Options FollowSymLinks
        Require all granted
    </Directory>
    
    # PHP settings
    <FilesMatch \.php$>
        SetHandler application/x-httpd-php
    </FilesMatch>
    
    # Disable directory listing
    <DirectoryMatch "^/.*/\.git/">
        Require all denied
    </DirectoryMatch>
    
    # Security headers
    Header set X-Frame-Options "SAMEORIGIN"
    Header set X-Content-Type-Options "nosniff"
    Header set X-XSS-Protection "1; mode=block"
    
    ErrorLog /var/log/httpd/glfbikube-error.log
    CustomLog /var/log/httpd/glfbikube-access.log combined
</VirtualHost>
