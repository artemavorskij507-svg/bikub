openapi: 3.0.3
info:
  title: GLF BiKube API
  description: |
    API для системы доставки и логистики GLF BiKube.
    
    Основные возможности:
    - Управление заказами и задачами
    - Интеграция с платежными системами (Stripe, Vipps)
    - Управление диспетчеризацией и слотами
    - Мониторинг трафика и инцидентов
    - Система подписок и купонов
  version: 1.0.0
  contact:
    name: GLF BiKube Support
    email: support@glfbikube.no

servers:
  - url: http://localhost:2244/api/v1
    description: Local development server
  - url: https://api.glfbikube.no/api/v1
    description: Production server

paths:
  /health:
    get:
      summary: Health check endpoint
      tags:
        - System
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  service:
                    type: string
                    example: GLF BiKube API
                  version:
                    type: string
                    example: "1.0.0"

  /tasks:
    get:
      summary: List tasks
      tags:
        - Tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, ready, assigned, en_route, arrived, in_progress, paused, completed, failed, canceled]
        - name: assignee_id
          in: query
          schema:
            type: integer
        - name: zone_id
          in: query
          schema:
            type: integer
        - name: slot_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
    
    post:
      summary: Create a new task
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /tasks/{id}:
    patch:
      summary: Update a task
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskResponse'

  /tasks/{id}/events:
    post:
      summary: Record a task event
      tags:
        - Tasks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from_status:
                  type: string
                to_status:
                  type: string
                reason:
                  type: string
                payload:
                  type: object
      responses:
        '201':
          description: Event recorded successfully

  /orders:
    get:
      summary: List orders
      tags:
        - Orders
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
    
    post:
      summary: Create a new order
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderInput'
      responses:
        '201':
          description: Order created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

  /webhooks:
    post:
      summary: Webhook endpoint for external events
      tags:
        - Webhooks
      description: |
        Все webhook события подписываются через HMAC SHA256.
        Заголовки:
        - X-GLF-Signature: подпись события
        - X-GLF-Event-Type: тип события
        - X-GLF-Timestamp: timestamp события
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  example: task.completed
                payload:
                  type: object
      responses:
        '200':
          description: Webhook processed successfully

components:
  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        type:
          type: string
          example: dropoff
        status:
          type: string
          enum: [queued, ready, assigned, en_route, arrived, in_progress, paused, completed, failed, canceled]
        priority:
          type: string
          enum: [low, normal, high, urgent]
        assignee_id:
          type: integer
          nullable: true
        zone_id:
          type: integer
          nullable: true
        slot_id:
          type: integer
          nullable: true
        address_text:
          type: string
        lat:
          type: number
          format: float
        lng:
          type: number
          format: float
        window_start:
          type: string
          format: date-time
        window_end:
          type: string
          format: date-time
        sla_deadline_at:
          type: string
          format: date-time
          nullable: true
        proof_required:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    TaskInput:
      type: object
      required:
        - order_id
        - type
        - status
      properties:
        order_id:
          type: integer
        type:
          type: string
        status:
          type: string
        priority:
          type: string
        zone_id:
          type: integer
        slot_id:
          type: integer
        address_text:
          type: string
        lat:
          type: number
        lng:
          type: number
    
    TaskUpdate:
      type: object
      properties:
        status:
          type: string
        assignee_id:
          type: integer
        slot_id:
          type: integer
    
    TaskResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Task'
        message:
          type: string
    
    Order:
      type: object
      properties:
        id:
          type: integer
        order_number:
          type: string
        user_id:
          type: integer
        status:
          type: string
        total_amount:
          type: number
        currency:
          type: string
        payment_status:
          type: string
        created_at:
          type: string
          format: date-time
    
    OrderInput:
      type: object
      required:
        - user_id
        - items
      properties:
        user_id:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              service_type_id:
                type: integer
              quantity:
                type: integer
        location:
          type: object
          properties:
            lat:
              type: number
            lng:
              type: number
            address:
              type: string
    
    OrderResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/Order'
        message:
          type: string

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []


