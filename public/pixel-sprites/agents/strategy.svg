  <!-- Hair -->
  <rect x="8" y="2" width="16" height="4" fill="#1e3a8a"/>
  <rect x="10" y="0" width="12" height="2" fill="#1e3a8a"/>
  
  <!-- Arms -->
  <rect x="8" y="18" width="4" height="8" fill="#fbbf24"/>
  <rect x="20" y="18" width="4" height="8" fill="#fbbf24"/>
  
  <!-- Chess Piece -->
  <rect x="6" y="20" width="6" height="4" fill="#fbbf24"/>
  <rect x="7" y="21" width="4" height="2" fill="#fff"/>
  <rect x="9" y="20" width="1" height="4" fill="#fff"/>
  
  <!-- Legs -->
