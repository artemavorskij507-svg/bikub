<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Background -->
  <rect width="16" height="16" fill="transparent"/>
  
  <!-- Projector Body -->
  <rect x="2" y="4" width="12" height="8" fill="#6b7280"/>
  <rect x="2" y="4" width="12" height="2" fill="#9ca3af"/>
  
  <!-- Lens -->
  <rect x="4" y="6" width="8" height="4" fill="#1e3a8a"/>
  <rect x="5" y="7" width="6" height="2" fill="#3b82f6"/>
  <rect x="6" y="7" width="4" height="2" fill="#60a5fa"/>
  
  <!-- Vents -->
  <rect x="3" y="8" width="2" height="2" fill="#4b5563"/>
  <rect x="11" y="8" width="2" height="2" fill="#4b5563"/>
  
  <!-- Control Panel -->
  <rect x="6" y="10" width="4" height="2" fill="#4b5563"/>
  <rect x="7" y="11" width="2" height="1" fill="#10b981"/>
  
  <!-- Power Button -->
  <rect x="12" y="5" width="2" height="2" fill="#ef4444"/>
  <rect x="12" y="5" width="1" height="1" fill="#fca5a5"/>
  
  <!-- Mount -->
  <rect x="6" y="12" width="4" height="2" fill="#4b5563"/>
  <rect x="7" y="14" width="2" height="2" fill="#6b7280"/>
</svg>
