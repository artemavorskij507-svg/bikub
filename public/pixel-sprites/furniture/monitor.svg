<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Background -->
  <rect width="16" height="16" fill="transparent"/>
  
  <!-- Monitor Frame -->
  <rect x="0" y="0" width="16" height="12" fill="#1e3a8a"/>
  <rect x="1" y="1" width="14" height="10" fill="#3b82f6"/>
  
  <!-- Screen -->
  <rect x="2" y="2" width="12" height="8" fill="#0f3460"/>
  <rect x="3" y="3" width="10" height="6" fill="#1a1a2e"/>
  
  <!-- Screen Content -->
  <rect x="4" y="4" width="8" height="4" fill="#10b981"/>
  <rect x="5" y="5" width="6" height="2" fill="#fff"/>
  
  <!-- Stand -->
  <rect x="6" y="12" width="4" height="2" fill="#6b7280"/>
  <rect x="4" y="14" width="8" height="2" fill="#6b7280"/>
</svg>
